services:
  mysql:
    image: mysql:8.0
    # severalnines/sysbench client uses an old MariaDB lib that can't negotiate
    # caching_sha2_password. Safe only because this stack is ephemeral + no real data.
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: bench
      MYSQL_DATABASE: sbtest
      MYSQL_ROOT_HOST: '%'
    ports:
      - "23306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pbench"]
      interval: 3s
      timeout: 3s
      retries: 30
  sysbench:
    image: severalnines/sysbench:latest
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]

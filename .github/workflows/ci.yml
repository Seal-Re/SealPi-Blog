name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test (sealpi-blog)
        working-directory: sealpi-blog
        # Ensure wrapper is executable on Linux runners.
        run: |
          chmod +x ./mvnw
          ./mvnw -q test

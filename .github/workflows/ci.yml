name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test (sealpi-blog)
        working-directory: sealpi-blog
        # Ensure wrapper is executable on Linux runners.
        run: |
          chmod +x ./mvnw
          ./mvnw -q test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tailwind-nextjs-starter-blog-sealpi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tailwind-nextjs-starter-blog-sealpi/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint --dir app --dir components --dir lib --dir layouts

      - name: Unit tests
        run: npm test

      - name: Build
        # Provide minimal env vars so Next.js build does not crash on missing
        # required values. Real secrets are not needed for a type/compile check.
        env:
          BLOG_API_BASE_URL: http://localhost:13310
          NEXT_PUBLIC_BLOG_API_BASE_URL: http://localhost:13310
          AUTH_SECRET: ci-placeholder-secret-not-real
          ADMIN_JWT_SECRET: ci-placeholder-secret-not-real
          ADMIN_GITHUB_USERIDS: '0'
          BLOG_INTERNAL_SYNC_SECRET: ci-placeholder-secret-not-real
          MINIO_PUBLIC_HOSTNAME: localhost
        run: npx next build

  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker-compose services (linux/amd64)
        # CI runner is amd64; we pin for repeatability.
        run: |
          docker compose build --no-cache

      - name: Bring up stack
        run: |
          docker compose up -d

      - name: Smoke check
        run: |
          docker compose ps

      - name: Tear down
        if: always()
        run: |
          docker compose down -v

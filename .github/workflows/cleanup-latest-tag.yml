name: cleanup-latest-tag
# One-shot: delete every package version that carries the ":latest" tag from
# both container packages. Required after the 2026-05-02 GHCR hijack
# (compromised :latest digest 53a13d89... shipped Next 15.2.4 RCE).
#
# Going forward, deploy.yml no longer pushes :latest at all (only sha-<7chars>),
# so this workflow only needs to run once to remove the residual tags.
#
# Trigger manually: gh workflow run cleanup-latest-tag.yml -R Seal-Re/SealPi-Blog
on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete :latest from frontend + backend packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER=Seal-Re
          for pkg in sealpi-blog-frontend sealpi-blog-backend; do
            echo "::group::Scanning $pkg"
            # List all versions, filter to those tagged with 'latest'.
            VIDS=$(gh api -H 'Accept: application/vnd.github+json' \
              "users/${OWNER}/packages/container/${pkg}/versions" \
              --paginate \
              --jq '.[] | select(.metadata.container.tags | index("latest")) | .id')
            if [ -z "${VIDS}" ]; then
              echo "no :latest version found for $pkg"
              echo '::endgroup::'
              continue
            fi
            for vid in $VIDS; do
              echo "deleting $pkg version $vid"
              gh api -X DELETE -H 'Accept: application/vnd.github+json' \
                "users/${OWNER}/packages/container/${pkg}/versions/${vid}"
            done
            echo '::endgroup::'
          done
          echo "Done."

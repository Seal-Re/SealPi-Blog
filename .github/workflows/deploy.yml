name: deploy

on:
  push:
    branches: [main]
    # Skip deploy for documentation-only commits (no built artifact change).
    # If a commit touches both code and docs the deploy still runs.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:

# Prevent overlapping deploys to the same environment.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: seal-re
  BACKEND_IMAGE: sealpi-blog-backend
  FRONTEND_IMAGE: sealpi-blog-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven package (skip tests — ci.yml already covered)
        working-directory: sealpi-blog
        run: |
          chmod +x ./mvnw
          ./mvnw -q package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}
          # Only immutable per-commit tags. NEVER tag :latest — see
          # docker-compose.prod.yml comments and 2026-05-02 incident memo.
          tags: |
            type=sha,format=short

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: sealpi-blog
          file: sealpi-blog/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Trivy CVE scan (backend)
        # Fail the build on CRITICAL or HIGH OS-package CVEs. Image was just
        # pushed; we scan the registry tag we'll deploy from.
        # TODO: pin to a SHA when done iterating. `master` is acceptable for now
        # but introduces supply-chain trust on aquasecurity org.
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:sha-${{ steps.sha.outputs.short }}
          # Hard gate: fail build only on CRITICAL. HIGH is reported but
          # non-blocking — most are transitive npm/maven deps that need
          # upstream releases. Tighten to CRITICAL+HIGH once the noisy
          # baseline is cleaned up.
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          format: 'table'
        env:
          # Avoid trivy DB rate limits on Docker Hub
          TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db'

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}
          # Only immutable per-commit tags — see backend job + 2026-05-02 incident.
          tags: |
            type=sha,format=short

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: tailwind-nextjs-starter-blog-sealpi
          file: tailwind-nextjs-starter-blog-sealpi/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* are baked into the client JS bundle at build time.
          build-args: |
            NEXT_PUBLIC_BLOG_API_BASE_URL=https://blog.sealpi.cn
            MINIO_PUBLIC_HOSTNAME=blog.sealpi.cn
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Trivy CVE scan (frontend)
        # TODO: pin to a SHA when done iterating. `master` is acceptable for now
        # but introduces supply-chain trust on aquasecurity org.
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:sha-${{ steps.sha.outputs.short }}
          # Hard gate: fail build only on CRITICAL. HIGH is reported but
          # non-blocking — most are transitive npm/maven deps that need
          # upstream releases. Tighten to CRITICAL+HIGH once the noisy
          # baseline is cleaned up.
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          format: 'table'
        env:
          TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db'

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml"
          target: "/opt/sealpi-blog"
          overwrite: true

      - name: Compute pinned image tag
        id: tag
        # docker/metadata-action's `type=sha,format=short` produces sha-<7chars>.
        # We replicate it here so the deploy step refers to the exact same tag.
        run: |
          short="${GITHUB_SHA:0:7}"
          echo "image_tag=sha-${short}" >> "$GITHUB_OUTPUT"

      - name: SSH deploy (pull + up)
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Pin image tags to this commit's short SHA. docker-compose.prod.yml
          # references ${BACKEND_TAG} / ${FRONTEND_TAG} with `:?` modifier so
          # a missing var fails fast instead of silently using `:latest`.
          # Defense-in-depth against GHCR tag-squatting attacks (prior incident
          # used :latest to push backdoored image).
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: IMAGE_TAG
          # Pull pinned images from ghcr.io, restart containers, prune dangling.
          # .env.backend.local lives on server (Mode A), CI never writes secrets.
          script: |
            set -euo pipefail
            cd /opt/sealpi-blog
            export BACKEND_TAG="$IMAGE_TAG"
            export FRONTEND_TAG="$IMAGE_TAG"
            echo "Deploying tag: $IMAGE_TAG"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml --env-file .env.backend.local pull
            docker compose -f docker-compose.prod.yml --env-file .env.backend.local up -d --remove-orphans
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps

services:
  mysql:
    image: mysql:8.0
    container_name: sealpi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sealpi_blog
    ports:
      - "13307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  minio:
    image: minio/minio:latest
    container_name: sealpi-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "13308:9000"
      - "13309:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
    command: >
      "mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/blog-assets || true"

  blog-start:
    image: sealpi-blog-blog-start:latest
    container_name: sealpi-blog-start
    depends_on:
      - mysql
      - minio
      - minio-init
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sealpi_blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      ADMIN_JWT_SECRET: "e4b7b2f4c9a0d8e1f5b6a7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8"
      ADMIN_GITHUB_USERIds: "190578785"
      ADMIN_JWT_GITHUBUSERIDCLAIM: githubUserId
      # 兜底：用 Spring 应用 JSON 强制覆盖属性（绕过 env key 到 camelCase 的映射差异）
      SPRING_APPLICATION_JSON: '{"admin":{"github":{"userIds":"190578785"}}}'
      ADMIN_UPLOAD_MINIO_ENDPOINT: http://minio:9000
      ADMIN_UPLOAD_MINIO_ACCESSKEY: minioadmin
      ADMIN_UPLOAD_MINIO_SECRETKEY: minioadmin
      ADMIN_UPLOAD_MINIO_BUCKET: blog-assets
      ADMIN_UPLOAD_PUBLICBASEURL: http://localhost:13308
      BLOG_INTERNAL_SYNC_SECRET: "change-me-internal-sync"
    ports:
      - "13310:8080"

volumes:
  mysql_data:
  minio_data:
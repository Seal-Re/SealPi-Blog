services:
  mysql:
    image: mysql:8.0
    container_name: sealpi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sealpi_blog}
    ports:
      - "13307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  minio:
    image: minio/minio:latest
    container_name: sealpi-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "13308:9000"
      - "13309:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
    command: >
      "mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/blog-assets || true"

  blog-start:
    image: sealpi-blog-blog-start:latest
    container_name: sealpi-blog-start
    depends_on:
      - mysql
      - minio
      - minio-init
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-sealpi_blog}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_GITHUB_USERIDS: ${ADMIN_GITHUB_USERIDS}
      ADMIN_JWT_GITHUBUSERIDCLAIM: ${ADMIN_JWT_GITHUBUSERIDCLAIM:-githubUserId}
      ADMIN_GITHUB_USERAPI: https://api.github.com/user
      ADMIN_UPLOAD_MINIO_ENDPOINT: http://minio:9000
      ADMIN_UPLOAD_MINIO_ACCESSKEY: ${MINIO_ROOT_USER}
      ADMIN_UPLOAD_MINIO_SECRETKEY: ${MINIO_ROOT_PASSWORD}
      ADMIN_UPLOAD_MINIO_BUCKET: blog-assets
      ADMIN_UPLOAD_PUBLICBASEURL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:13308}
      BLOG_INTERNAL_SYNC_SECRET: ${BLOG_INTERNAL_SYNC_SECRET}
    ports:
      - "13310:8080"

volumes:
  mysql_data:
  minio_data:
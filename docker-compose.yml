services:
  mysql:
    image: mysql:8.0
    container_name: sealpi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sealpi_blog}
    ports:
      - "13307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  minio:
    image: minio/minio:latest
    container_name: sealpi-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "13308:9000"
      - "13309:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
    # Create bucket and set public-read policy so uploaded images are accessible
    # without signed URLs. The blog-assets bucket serves cover images and article
    # assets; only write operations remain protected by MinIO credentials.
    command: >
      "mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/blog-assets || true &&
      mc anonymous set public local/blog-assets"

  blog-start:
    image: sealpi-blog-blog-start:latest
    container_name: sealpi-blog-start
    depends_on:
      - mysql
      - minio
      - minio-init
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-sealpi_blog}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_GITHUB_USERIDS: ${ADMIN_GITHUB_USERIDS}
      ADMIN_JWT_GITHUBUSERIDCLAIM: ${ADMIN_JWT_GITHUBUSERIDCLAIM:-githubUserId}
      ADMIN_GITHUB_USERAPI: https://api.github.com/user
      ADMIN_UPLOAD_MINIO_ENDPOINT: http://minio:9000
      ADMIN_UPLOAD_MINIO_ACCESSKEY: ${MINIO_ROOT_USER}
      ADMIN_UPLOAD_MINIO_SECRETKEY: ${MINIO_ROOT_PASSWORD}
      ADMIN_UPLOAD_MINIO_BUCKET: blog-assets
      ADMIN_UPLOAD_PUBLICBASEURL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:13308}
      BLOG_INTERNAL_SYNC_SECRET: ${BLOG_INTERNAL_SYNC_SECRET}
      # Flyway baseline — only needed when migrating an existing DB that has no
      # schema history table. Omit (or set to false) for fresh installations so
      # Flyway runs all migrations (V0→V3) on the empty MySQL volume.
      # SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      # SPRING_FLYWAY_BASELINE_VERSION: "2"
    ports:
      - "13310:8080"

  frontend:
    build:
      context: tailwind-nextjs-starter-blog-sealpi
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is baked into the JS bundle at build time.
        # For local all-in-one deployment the browser accesses backend via host port 13310.
        # For production, set NEXT_PUBLIC_BLOG_API_BASE_URL to the real backend public URL.
        NEXT_PUBLIC_BLOG_API_BASE_URL: ${NEXT_PUBLIC_BLOG_API_BASE_URL:-http://localhost:13310}
        MINIO_PUBLIC_HOSTNAME: ${MINIO_PUBLIC_HOSTNAME:-localhost}
    container_name: sealpi-frontend
    depends_on:
      - blog-start
    environment:
      # Server-side (SSR/BFF) calls go through the internal Docker network.
      BLOG_API_BASE_URL: http://blog-start:8080
      # NextAuth — AUTH_URL must match the GitHub OAuth callback URL registered in your app.
      # For local deployment: http://localhost:13311
      AUTH_URL: ${AUTH_URL:-http://localhost:13311}
      AUTH_SECRET: ${AUTH_SECRET}
      GITHUB_ID: ${GITHUB_ID}
      GITHUB_SECRET: ${GITHUB_SECRET}
      ADMIN_GITHUB_USERIDS: ${ADMIN_GITHUB_USERIDS}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_JWT_GITHUBUSERIDCLAIM: ${ADMIN_JWT_GITHUBUSERIDCLAIM:-githubUserId}
      BLOG_INTERNAL_SYNC_SECRET: ${BLOG_INTERNAL_SYNC_SECRET}
      MINIO_PUBLIC_HOSTNAME: ${MINIO_PUBLIC_HOSTNAME:-localhost}
    ports:
      - "13311:3000"

volumes:
  mysql_data:
  minio_data:
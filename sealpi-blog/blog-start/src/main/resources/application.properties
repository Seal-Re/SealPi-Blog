spring.application.name=blog-start

# Next.js 等服务端调用：OAuth 用户落库同步（请求头 X-Blog-Internal-Sync-Secret）
blog.internal.sync.secret=${BLOG_INTERNAL_SYNC_SECRET:}

# admin auth (v1)
admin.jwt.secret=${ADMIN_JWT_SECRET:}
admin.github.userIds=${ADMIN_GITHUB_USERIDS:}
admin.jwt.githubUserIdClaim=${ADMIN_JWT_GITHUBUSERIDCLAIM:githubUserId}
admin.github.userApi=${ADMIN_GITHUB_USERAPI:https://api.github.com/user}
admin.auth.allowLegacyJwt=${ADMIN_AUTH_ALLOW_LEGACY_JWT:false}

# admin upload (MinIO)
# When enabled, configure internal endpoint/credentials; controller returns public url built from publicBaseUrl.
admin.upload.minio.endpoint=
admin.upload.minio.accessKey=
admin.upload.minio.secretKey=
admin.upload.minio.bucket=blog-assets
admin.upload.publicBaseUrl=

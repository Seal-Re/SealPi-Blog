spring.application.name=blog-start

# Flyway: for existing deployments that predate schema history, set
# SPRING_FLYWAY_BASELINE_ON_MIGRATE=true and SPRING_FLYWAY_BASELINE_VERSION=2
# via env var. Fresh installations leave these unset → baseline-on-migrate=false
# → Flyway runs all migrations (V0..V3) from scratch on an empty DB.
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:2}

# Next.js 等服务端调用：OAuth 用户落库同步（请求头 X-Blog-Internal-Sync-Secret）
blog.internal.sync.secret=${BLOG_INTERNAL_SYNC_SECRET:}

# admin auth (v1)
admin.jwt.secret=${ADMIN_JWT_SECRET:}
admin.github.userIds=${ADMIN_GITHUB_USERIDS:}
admin.jwt.githubUserIdClaim=${ADMIN_JWT_GITHUBUSERIDCLAIM:githubUserId}
admin.github.userApi=${ADMIN_GITHUB_USERAPI:https://api.github.com/user}
admin.auth.allowLegacyJwt=${ADMIN_AUTH_ALLOW_LEGACY_JWT:false}

# admin upload (MinIO)
# MinIO client is created only when ADMIN_UPLOAD_MINIO_ENDPOINT env var is set (non-empty).
# Spring Boot relaxed binding maps env vars automatically — no placeholder entries here,
# so the property remains absent (not empty-string) when the env var is unset,
# which prevents @ConditionalOnProperty from firing incorrectly.
admin.upload.minio.bucket=blog-assets
